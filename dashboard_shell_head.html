<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Reliability Health Review — RU IV Cilacap</title>
<style>

  :root {
    --bg: #f5f7fa;
    --bg2: #ffffff;
    --bg3: #eef1f6;
    --border: #dde2ec;
    --orange: #d45d00;
    --orange-dim: #fff0e6;
    --yellow: #b45309;
    --yellow-dim: #fef9ec;
    --green: #16a34a;
    --green-dim: #f0fdf4;
    --red: #dc2626;
    --red-dim: #fef2f2;
    --blue: #2563eb;
    --blue-dim: #eff6ff;
    --text: #1e2535;
    --muted: #6b7280;
    --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --sans: 'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    max-width: 100%;
    overflow-x: hidden;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    padding: 0;
  }

  /* ── HEADER ── */
  .header {
    background: #ffffff;
    border-bottom: 2px solid #ea580c;
    padding: 32px 40px 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left .label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .header-left h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .header-left h1 span { color: var(--orange); }
  .header-right {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .status-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .status-badge .badge-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .badge {
    padding: 6px 18px;
    border-radius: 4px;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .badge.yellow { background: #fef3c7; color: #92400e; border: 1px solid #d97706; }
  .badge.orange { background: #ffedd5; color: #9a3412; border: 1px solid #ea580c; }

  /* ── LAYOUT ── */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 28px 48px;
    display: grid;
    gap: 24px;
    width: 100%;
  }

  /* Grid responsif: kolom menyusut & membungkus otomatis sesuai lebar, tanpa scroll horizontal */
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }

  /* Tabel lebar (hotspot/management) scroll di dalam card-nya sendiri, bukan mendorong halaman */
  .card { overflow-x: auto; }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
  }
  .card-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* ── KPI METRICS ── */
  .kpi-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .kpi-card .kpi-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .kpi-card .kpi-val {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
  }
  .kpi-card .kpi-sub {
    font-size: 11px;
    color: var(--muted);
  }
  .kpi-card.green { border-left: 3px solid var(--green); }
  .kpi-card.orange { border-left: 3px solid var(--orange); }
  .kpi-card.red { border-left: 3px solid var(--red); }
  .kpi-card.blue { border-left: 3px solid var(--blue); }
  .kpi-card.green .kpi-val { color: var(--green); }
  .kpi-card.orange .kpi-val { color: var(--orange); }
  .kpi-card.red .kpi-val { color: var(--red); }
  .kpi-card.blue .kpi-val { color: var(--blue); }

  /* ── RISK METER ── */
  .risk-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .risk-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .risk-name {
    width: 180px;
    font-size: 12px;
    color: var(--text);
    flex-shrink: 0;
  }
  .risk-bar-track {
    flex: 1;
    height: 8px;
    background: var(--bg3);
    border-radius: 4px;
    overflow: hidden;
  }
  .risk-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .risk-val {
    font-family: var(--mono);
    font-size: 11px;
    width: 64px;
    text-align: right;
    color: var(--muted);
  }
  .risk-tag {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    width: 72px;
    text-align: center;
    flex-shrink: 0;
  }
  .risk-tag.critical { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
  .risk-tag.high { background: #fff7ed; color: #c2410c; border: 1px solid #fdba74; }
  .risk-tag.medium { background: #fefce8; color: #a16207; border: 1px solid #fde047; }
  .risk-tag.ok { background: #f0fdf4; color: #15803d; border: 1px solid #86efac; }

  /* ── SPEND BAR ── */
  .spend-section { display: flex; flex-direction: column; gap: 14px; }
  .spend-row { display: flex; flex-direction: column; gap: 4px; }
  .spend-header { display: flex; justify-content: space-between; font-size: 12px; }
  .spend-entity { color: var(--text); font-weight: 500; }
  .spend-pct { font-family: var(--mono); font-size: 11px; }
  .spend-track { height: 10px; background: var(--bg3); border-radius: 5px; overflow: hidden; }
  .spend-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, var(--blue), #6366f1); }
  .spend-sub { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); font-family: var(--mono); }

  /* ── HOTSPOT TABLE ── */
  .hotspot-table { width: 100%; border-collapse: collapse; }
  .hotspot-table th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .hotspot-table td {
    padding: 11px 12px;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .hotspot-table tr:last-child td { border-bottom: none; }
  .hotspot-table tr:hover td { background: #f8fafc; }
  .eq-tag {
    font-family: var(--mono);
    font-size: 11px;
    background: #eff6ff;
    padding: 2px 6px;
    border-radius: 3px;
    color: #1d4ed8;
    border: 1px solid #bfdbfe;
  }
  .sev-badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .sev-critical { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
  .sev-high { background: #fff7ed; color: #c2410c; border: 1px solid #fdba74; }
  .sev-medium { background: #fefce8; color: #a16207; border: 1px solid #fde047; }

  /* ── MANAGEMENT TABLE ── */
  .mgmt-table { width: 100%; border-collapse: collapse; }
  .mgmt-table th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .mgmt-table td {
    padding: 10px 12px;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .mgmt-table tr:last-child td { border-bottom: none; }
  .timeframe-chip {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    background: #eff6ff;
    color: #1d4ed8;
    border: 1px solid #bfdbfe;
    white-space: nowrap;
  }

  /* ── TREND INDICATORS ── */
  .trend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .trend-item {
    background: var(--bg3);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .trend-item-name { font-size: 12px; color: var(--text); }
  .trend-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  /* ── DATA QUALITY ── */
  .dq-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .dq-row:last-child { border-bottom: none; }
  .dq-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  /* ── FOOTER ── */
  .footer {
    border-top: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    flex-wrap: wrap;
    gap: 8px;
  }
  .footer .confidence {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .conf-pill {
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #d97706;
    padding: 2px 10px;
    border-radius: 3px;
    font-size: 10px;
  }

  @media (max-width: 768px) {
    .container { padding: 20px 16px 40px; }
    .header { padding: 20px 16px 16px; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .risk-name { width: 130px; font-size: 11px; }
    .footer { padding: 12px 16px; }
  }
</style>
</head>
<body>
